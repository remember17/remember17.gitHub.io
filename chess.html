<!DOCTYPE html><html lang="zh"> <head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>国际象棋</title><meta name="description" content="Private realtime chess room."><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap"><link rel="stylesheet" href="/styles/chess.css"></head> <body> <main class="app"> <section class="screen stack-screen" data-screen="site" hidden> <h1 class="screen-title" data-i18n="title">国际象棋</h1> <input id="sitePassword" type="text" inputmode="numeric" pattern="[0-9]*" enterkeyhint="go" autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false" autofocus data-i18n-placeholder="sitePasswordPlaceholder"> <button class="primary full" id="siteBtn" type="button">开局</button> <p class="hint" data-message></p> </section> <section class="screen board-screen" data-screen="board" hidden> <header class="board-bar"> <div class="board-head"> <div class="status"> <span data-role>-</span> <span data-peer>-</span> <span data-last-move>-</span> </div> <div class="head-actions"> <button class="restart-btn" type="button" data-restart-btn data-i18n="restartGame">重新开始</button> <span class="turn-dot wait-turn" data-turn-dot aria-label="等待对手"></span> </div> </div> <div class="share-row" data-share-row> <input id="roomLink" type="text" readonly> <button id="copyBtn" type="button" data-i18n="copyButton">复制</button> </div> </header> <div class="play-area"> <div class="board-wrap"> <div class="board" id="board" data-active="false"></div> <div class="promotion-menu" data-promotion-menu hidden></div> </div> </div> <div class="board-note" data-game-status></div> </section> </main> <script type="module" src="/scripts/chess.js"></script> </body> </html>
