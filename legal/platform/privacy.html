er center. After deletion, personal data that can be deleted is removed; transaction or audit records that must be retained by law are de-identified.&#34;}" data-astro-cid-xgxpja43>账号资料用于身份识别和跨产品登录。你可以在用户中心验证邮箱、修改密码或注销账号。注销后，可删除的个人数据会被清理；依法必须保留的交易或审计记录会进行去标识化处理。</p><h2 data-lang-copy="{&#34;zh&#34;:&#34;联系我们&#34;,&#34;en&#34;:&#34;Contact us&#34;}" data-astro-cid-xgxpja43>联系我们</h2><p data-lang-copy="{&#34;zh&#34;:&#34;隐私相关请求可通过反馈中心提交。&#34;,&#34;en&#34;:&#34;Privacy-related requests can be submitted through the feedback center.&#34;}" data-astro-cid-xgxpja43>隐私相关请求可通过反馈中心提交。</p> </article> </main> </body></html>
