id-xgxpja43>以 App 内购买（IAP）提交的信息为准，例如约每月 3 元或每年 28 元。</p><h2 data-lang-copy="{&#34;zh&#34;:&#34;付款&#34;,&#34;en&#34;:&#34;Payment&#34;}" data-astro-cid-xgxpja43>付款</h2><p data-lang-copy="{&#34;zh&#34;:&#34;确认购买并付款后，费用将记入您的 iTunes（Apple ID）账户。&#34;,&#34;en&#34;:&#34;Upon confirmation of purchase and payment, the charge will be applied to your iTunes (Apple ID) account.&#34;}" data-astro-cid-xgxpja43>确认购买并付款后，费用将记入您的 iTunes（Apple ID）账户。</p><h2 data-lang-copy="{&#34;zh&#34;:&#34;续订&#34;,&#34;en&#34;:&#34;Renewal&#34;}" data-astro-cid-xgxpja43>续订</h2><p data-lang-copy="{&#34;zh&#34;:&#34;Apple iTunes 账户会在当前订阅期到期前 24 小时内扣费；扣费成功后，订阅周期将顺延一个订阅周期。&#34;,&#34;en&#34;:&#34;Your Apple iTunes account will be charged within 24 hours before the current subscription period expires. Upon successful payment, the subscription will be extended for another subscription period.&#34;}" data-astro-cid-xgxpja43>Apple iTunes 账户会在当前订阅期到期前 24 小时内扣费；扣费成功后，订阅周期将顺延一个订阅周期。</p><h2 data-lang-copy="{&#34;zh&#34;:&#34;取消订阅&#34;,&#34;en&#34;:&#34;Cancel Subscription&#34;}" data-astro-cid-xgxpja43>取消订阅</h2><p data-lang-copy="{&#34;zh&#34;:&#34;如需取消续订，请在当前订阅周期到期前至少 24 小时，在 iTunes / Apple ID 设置中手动关闭自动续订。&#34;,&#34;en&#34;:&#34;To cancel renewal, please manually turn off the auto-renewal feature in your iTunes/Apple ID settings at least 24 hours before the current subscription period expires.&#34;}" data-astro-cid-xgxpja43>如需取消续订，请在当前订阅周期到期前至少 24 小时，在 iTunes / Apple ID 设置中手动关闭自动续订。</p> </article> </main> </body></html>
